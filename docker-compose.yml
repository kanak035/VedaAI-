version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: vedaai-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vedaai

  redis:
    image: redis:7-alpine
    container_name: vedaai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vedaai-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/vedaai
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vedaai-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:5000/ws
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
